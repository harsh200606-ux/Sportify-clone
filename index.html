<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Document</title>
</head>
<body>
    
    <div class="cointainer flex bg-black">
        
        
    
        <div  class="left  ">
            <div class="home p-1 m-1 rounded bg-grey">
                <div class="logo"><img class="invert" src="logo.svg"></div>
                <ul>
                    <li><img class="invert" src=home.svg> Home</li>
                    <li><img class="invert" src=search.svg>Search</li>
                </ul>

            </div>
            <div class="libary p-1 m-1 rounded bg-grey">
                <div class="heading">
                    <img class="invert" src="lib.svg">
                    <h2>Your libary</h2>
                    

                </div>
                <div class="songlist">
                        <ul>
                            <!--li>
                                <img class="invert svg-music" src="music.svg" alt="">
                                <div class="info">
                                    <div>song name</div>
                                    <div>song artist</div>
                                </div>
                                <div class="playnow">
                                    <span>Play Now</span>
                                    <img class="invert" src="play.svg" alt="" >
                                </div>
                                
                            </li-->
                        </ul>
                </div>
                <div class="footer">
                
                    
                    <div><a href="https://www.spotify.com/in/legal/"><span>Legal</span></a></div>
                    <div><a href="https://www.spotify.com/jp/privacy/"><span>Privacy Center</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/"><span>Privacy Policy</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/cookies-policy/"><span>Cookies</span></a></div>
                    <div><a href="https://www.spotify.com/jp/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
                    <div><a href="https://www.spotify.com/jp/accessibility/"><span>Accessibility</span></a></div>
                </div>  
                
                
            </div>
                 

                   
                
            
                                           

        </div>
        <div class="right   rounded bg-grey">
            <div class="header">
                <div class="nav">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5.5 12.002H19" />
                    <path d="M10.9999 18.002C10.9999 18.002 4.99998 13.583 4.99997 12.0019C4.99996 10.4208 11 6.00195 11 6.00195" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentcolor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18.5 12L4.99997 12" />
                    <path d="M13 18C13 18 19 13.5811 19 12C19 10.4188 13 6 13 6" />
                    </svg>
                </div>
                <div class="button">
                    <button class="sign-button">sign-up</button>
                    <button class="login-button">Login</button>
                    
                </div>
            </div>
            <div class="sportify-play">
                <h1>Sportify Playlists</h1>
                <div class="card-container">
                    <div class="card ">
                        <div class="play">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 20V4L19 12L5 20Z"
                            stroke="#141B34"
                            fill="#000"
                            stroke-width="1.5"
                            stroke-linejoin="round" />
                            </svg>

                                
                               
                        </div>
                        <img src="https://i1.sndcdn.com/artworks-000460374423-rf1f23-t500x500.jpg" alt="">
                        <br>
                        <h>Blizzard (DB)</h>
                        <p>The strongest in universe(GOKU)</p>

                    </div>
                    <div class="card ">
                        <div class="play">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 20V4L19 12L5 20Z"
                            stroke="#141B34"
                            fill="#000"
                            stroke-width="1.5"
                            stroke-linejoin="round" />
                            </svg>

                                
                               
                        </div>
                        <img src="https://i1.sndcdn.com/artworks-000460374423-rf1f23-t500x500.jpg" alt="">
                        <br>
                        <h>Blizzard (DB)</h>
                        <p>The strongest in universe(GOKU)</p>

                    </div>
                    
                    
                    
                     
                    
                </div>
                <div class="play-bar">
                    <div class="seekbar">
                        <div class="circle">

                        </div>
                    </div>
                    <div class="songinfo">


                    </div>
                    <div class="song-button">
                        <img id="previous" class="invert"src="presong.svg" alt="">
                        <img id="play" class="invert"src="play.svg" alt="">
                        <img id="next" class="invert"src="nextsong.svg" alt="">
                      
                    </div>
                    <div class="songtime">
                        
                    </div>
                </div>

            </div>
           
        </div>
    </div>
    <script src="script.js"></script>
    


    
</body>
</html>
